<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Factory Smoke Test — Production Line</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.65);

        --grey: #6b7280;
        --amber: #f59e0b; /* FR2 */
        --green: #22c55e; /* FR2 */

        --station-w: 172px;
        --station-h: 96px;
        --gap: 18px;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f5f7ff;
          --panel: rgba(0, 0, 0, 0.05);
          --text: rgba(0, 0, 0, 0.88);
          --muted: rgba(0, 0, 0, 0.62);
        }
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        background: radial-gradient(900px 480px at 20% 0%, rgba(34, 197, 94, 0.18), transparent 60%),
          radial-gradient(720px 420px at 80% 0%, rgba(245, 158, 11, 0.16), transparent 55%), var(--bg);
        color: var(--text);
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 18px 42px;
      }

      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }
      header h1 {
        font-size: 18px;
        margin: 0;
        font-weight: 750;
        letter-spacing: 0.2px;
      }
      header .sub {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 12.5px;
      }

      main {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: var(--panel);
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
      }

      .line {
        position: relative;
        padding: 16px 12px 8px;
      }

      .stations {
        display: grid;
        grid-template-columns: repeat(5, var(--station-w));
        gap: var(--gap);
        justify-content: space-between;
        align-items: start;
        margin-top: 10px;
        overflow-x: auto;
        padding-bottom: 12px;
      }

      .station {
        width: var(--station-w);
        height: var(--station-h);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.10);
        padding: 12px 12px 10px;
        position: relative;
      }

      .station .title {
        font-weight: 750;
        font-size: 13.5px;
        margin: 0 0 10px;
        letter-spacing: 0.2px;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--grey);
        box-shadow: 0 0 0 0 rgba(245, 158, 11, 0);
        transition: background 220ms ease;
      }

      /* State colors */
      .station[data-state="grey"] .dot {
        background: var(--grey);
      }
      .station[data-state="amber"] .dot {
        background: var(--amber);
        animation: pulse-amber 520ms ease-out 1;
      }
      .station[data-state="green"] .dot {
        background: var(--green);
        animation: pop-green 320ms ease-out 1;
      }

      @keyframes pulse-amber {
        0% {
          box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.0);
        }
        30% {
          box-shadow: 0 0 0 8px rgba(245, 158, 11, 0.16);
        }
        100% {
          box-shadow: 0 0 0 14px rgba(245, 158, 11, 0.0);
        }
      }
      @keyframes pop-green {
        0% {
          transform: scale(0.92);
        }
        70% {
          transform: scale(1.10);
        }
        100% {
          transform: scale(1.0);
        }
      }

      /* Conveyor line */
      .conveyor {
        position: absolute;
        left: 12px;
        right: 12px;
        top: 58px;
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        overflow: hidden;
      }

      .conveyor::after {
        content: "";
        display: block;
        height: 100%;
        width: 60px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.22), transparent);
        opacity: 0.8;
        animation: shimmer 1.1s linear infinite;
      }

      @keyframes shimmer {
        0% {
          transform: translateX(-80px);
        }
        100% {
          transform: translateX(calc(100vw + 80px));
        }
      }

      /* Item marker */
      .item {
        position: absolute;
        top: 45px;
        left: 12px;
        width: 22px;
        height: 22px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        color: rgba(0, 0, 0, 0.82);
        display: grid;
        place-items: center;
        font-size: 12px;
        font-weight: 900;
        transform: translateX(0);
        transition: transform 420ms cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.22);
      }

      .complete-banner {
        margin-top: 10px;
        text-align: center;
        font-weight: 900;
        letter-spacing: 0.8px;
        color: var(--green);
        opacity: 0;
        transform: translateY(6px);
        transition: opacity 220ms ease, transform 220ms ease;
        user-select: none;
      }
      .complete-banner[data-show="true"] {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 980px) {
        .stations {
          justify-content: start;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <h1>Factory Smoke Test — Production Line</h1>
          <p class="sub">Grey (Pending) → Amber (Running) → Green (Complete)</p>
        </div>
      </header>

      <main>
        <div class="line" aria-label="factory production line">
          <div class="conveyor" aria-hidden="true"></div>
          <div class="item" id="item" aria-hidden="true">◆</div>

          <div class="stations" id="stations">
            <section class="station" data-state="grey" data-index="0">
              <p class="title">Intake</p>
              <div class="status">
                <span class="dot" aria-hidden="true"></span>
                <span class="status-text">Pending</span>
              </div>
            </section>

            <section class="station" data-state="grey" data-index="1">
              <p class="title">Build</p>
              <div class="status">
                <span class="dot" aria-hidden="true"></span>
                <span class="status-text">Pending</span>
              </div>
            </section>

            <section class="station" data-state="grey" data-index="2">
              <p class="title">Test</p>
              <div class="status">
                <span class="dot" aria-hidden="true"></span>
                <span class="status-text">Pending</span>
              </div>
            </section>

            <section class="station" data-state="grey" data-index="3">
              <p class="title">Inspect</p>
              <div class="status">
                <span class="dot" aria-hidden="true"></span>
                <span class="status-text">Pending</span>
              </div>
            </section>

            <section class="station" data-state="grey" data-index="4">
              <p class="title">Release</p>
              <div class="status">
                <span class="dot" aria-hidden="true"></span>
                <span class="status-text">Pending</span>
              </div>
            </section>
          </div>

          <div class="complete-banner" id="completeBanner" data-show="false">ALL STATIONS COMPLETE</div>
        </div>
      </main>
    </div>

    <script>
      (function () {
        const stationsEl = document.getElementById('stations');
        const stationEls = Array.from(stationsEl.querySelectorAll('.station'));
        const itemEl = document.getElementById('item');
        const completeBanner = document.getElementById('completeBanner');

        const STATE_TEXT = {
          grey: 'Pending',
          amber: 'Running',
          green: 'Complete',
        };

        function sleep(ms) {
          return new Promise((resolve) => setTimeout(resolve, ms));
        }

        function setStationState(i, state) {
          const el = stationEls[i];
          el.dataset.state = state;
          const txt = el.querySelector('.status-text');
          if (txt) txt.textContent = STATE_TEXT[state] ?? state;
        }

        function setAll(state) {
          for (let i = 0; i < stationEls.length; i++) setStationState(i, state);
        }

        function moveItemTo(index) {
          const target = stationEls[index];
          const lineRect = stationsEl.getBoundingClientRect();
          const r = target.getBoundingClientRect();
          const x = (r.left - lineRect.left) + (r.width / 2) - 11; // 11 = item half width
          itemEl.style.transform = `translateX(${Math.max(0, x)}px)`;
        }

        async function runOnce() {
          completeBanner.dataset.show = 'false';
          setAll('grey');
          moveItemTo(0);

          for (let i = 0; i < stationEls.length; i++) {
            moveItemTo(i);

            // FR2: amber (Running) for 1s, then green (Complete)
            setStationState(i, 'amber');
            await sleep(1000);
            setStationState(i, 'green');

            // Next station starts after previous one turns green.
            await sleep(120);
          }

          completeBanner.dataset.show = 'true';
        }

        // Run on page load.
        runOnce();

        // Keep item alignment on resize.
        window.addEventListener('resize', () => {
          // Find the first non-green station, otherwise last.
          let idx = stationEls.findIndex((el) => el.dataset.state !== 'green');
          if (idx === -1) idx = stationEls.length - 1;
          moveItemTo(Math.max(0, idx));
        });
      })();
    </script>
  </body>
</html>
